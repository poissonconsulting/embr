    branches: [main, master, dev]
permissions:
  contents: read
jobs:
  R-CMD-check:
    uses: poissonconsulting/.github/.github/workflows/R-CMD-check.yaml@v1
    with:
      tier: important
      jags: true
      cmdstan: true
      tex: false
      private: false
    secrets: inherit
